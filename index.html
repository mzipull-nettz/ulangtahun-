<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 Happy Birthday 🎉</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    text-align:center;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.95);
    width:90%;
    max-width:600px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    animation:fadeIn 1s ease;
    z-index:10;
}

@keyframes fadeIn{
    from{opacity:0;transform:scale(0.9);}
    to{opacity:1;transform:scale(1);}
}

h1{
    color:#ff4081;
    margin-bottom:10px;
}

p{
    margin:10px 0;
}

button{
    margin-top:15px;
    padding:14px 25px;
    border:none;
    border-radius:12px;
    background:#ff4081;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

/* PESAN */
#pesan{
    display:none;
    margin-top:20px;
    line-height:1.7;
    animation:show 1s ease;
}

@keyframes show{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

/* BALON */
.balon{
    position:absolute;
    bottom:-120px;
    font-size:40px;
    animation:up linear infinite;
    opacity:0.8;
}

@keyframes up{
    from{transform:translateY(0);}
    to{transform:translateY(-120vh);}
}

/* CONFETTI */
.confetti{
    position:absolute;
    top:-50px;
    font-size:18px;
    animation:down linear forwards;
}

@keyframes down{
    to{transform:translateY(110vh) rotate(360deg);}
}
</style>
</head>

<body>

<div class="card">

<h1>🎂 Happy Birthday 🎉</h1>
<p>Ada pesan spesial buat kamu ✨</p>

<button onclick="start()">💖 Klik Di Sini 💖</button>

<div id="pesan">

<h2>🥳 Selamat Ulang Tahun!</h2>

<p>Semoga sehat selalu dan bahagia selalu ✨</p>
<p>Semoga semua impianmu tercapai 🌷</p>
<p>Tetap jadi pribadi yang lebih baik setiap hari 💖</p>

<h3>🎂 Happy Birthday 🎂</h3>

</div>

</div>

<script>

/* ================= AUDIO ================= */
let audioCtx = null;

function initAudio(){
    if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === "suspended"){
        audioCtx.resume();
    }
}

/* ================= STATE ================= */
let played = false;

/* ================= START ================= */
function start(){
if(played) return;
played = true;

document.getElementById("pesan").style.display="block";

confetti();
music();
}

/* ================= CONFETTI ================= */
let confCount = 0;

function confetti(){

if(confCount > 100) return;

for(let i=0;i<35;i++){
let c = document.createElement("div");
c.className="confetti";
c.innerHTML=["🎉","🎊","✨","💖","🎂"][Math.floor(Math.random()*5)];

c.style.left = Math.random()*100+"vw";
c.style.fontSize = (Math.random()*10+15)+"px";
c.style.animationDuration = (Math.random()*3+2)+"s";

document.body.appendChild(c);

confCount++;

setTimeout(()=>{
c.remove();
confCount--;
},5000);
}
}

/* ================= BALON ================= */
for(let i=0;i<12;i++){
let b=document.createElement("div");
b.className="balon";
b.innerHTML="🎈";

b.style.left=Math.random()*100+"vw";
b.style.animationDuration=(Math.random()*8+8)+"s";

document.body.appendChild(b);
}

/* ================= NOTE ================= */
function playNote(freq,time){
initAudio();

const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();

osc.type="sine";
osc.frequency.value=freq;

gain.gain.setValueAtTime(0.2,audioCtx.currentTime);

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.start();
osc.stop(audioCtx.currentTime + time/1000);
}

/* ================= MUSIC ================= */
function sleep(ms){
return new Promise(r=>setTimeout(r,ms));
}

async function music(){

const n={
C4:261.63,
D4:293.66,
E4:329.63,
F4:349.23,
G4:392.00,
A4:440.00,
Bb4:466.16,
C5:523.25
};

const song=[
[n.C4,400],[n.C4,400],[n.D4,800],[n.C4,800],
[n.F4,800],[n.E4,1200],

[n.C4,400],[n.C4,400],[n.D4,800],[n.C4,800],
[n.G4,800],[n.F4,1200],

[n.C4,400],[n.C4,400],[n.C5,800],[n.A4,800],
[n.F4,800],[n.E4,800],[n.D4,1200],

[n.Bb4,400],[n.Bb4,400],[n.A4,800],[n.F4,800],
[n.G4,800],[n.F4,1500]
];

for(let i=0;i<song.length;i++){
playNote(song[i][0],song[i][1]);
await sleep(song[i][1]);
}
}

</script>

</body>
</html>
